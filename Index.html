<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patalix DialPad</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; }
        body { background: #0F0F10; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; }
        
        .dialer-container { width: 100%; max-width: 360px; padding: 25px; display: flex; flex-direction: column; align-items: center; background: #17171C; border-radius: 30px; box-shadow: 0px 10px 30px rgba(0,0,0,0.5); }
        
        /* 💰 एड्स (Ads) के लिए टॉप बैनर की जगह */
        .ad-banner { width: 100%; height: 55px; background: #222227; margin-bottom: 25px; display: flex; justify-content: center; align-items: center; font-size: 12px; color: #888; border: 1px dashed #444; border-radius: 10px; }
        
        .display { width: 100%; height: 60px; font-size: 36px; text-align: center; border: none; background: transparent; color: white; margin-bottom: 30px; outline: none; letter-spacing: 2px; }
        .display::placeholder { color: #444; font-size: 24px; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; width: 100%; justify-items: center; }
        
        /* 🎨 बटन का स्टाइल (यहाँ से आप CSS बदल सकते हैं) */
        .btn { width: 75px; height: 75px; border-radius: 50%; background: #24242C; color: white; font-size: 30px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.1s; user-select: none; }
        .btn:active { background: #3A3A45; transform: scale(0.95); }
        
        /* 📞 कॉल बटन का स्टाइल */
        .call-btn { background: #25D366; grid-column: 2; box-shadow: 0px 5px 15px rgba(37, 211, 102, 0.4); }
        .call-btn:active { background: #1ebd59; }
        
        /* ❌ डिलीट बटन का स्टाइल */
        .delete-btn { font-size: 22px; background: transparent; color: #FF3B30; }
    </style>
</head>
<body>

<div class="dialer-container">
    <!-- यहाँ आपका AdMob का बैनer एड लोड होगा -->
    <div class="ad-banner">📢 AdMob Banner Advertisement Box</div>

    <!-- नंबर दिखने वाली स्क्रीन -->
    <input type="text" class="display" id="phone-screen" placeholder="नंबर डालें" readonly>
    
    <!-- डायलर पैड ग्रिड -->
    <div class="grid">
        <div class="btn" onclick="appendNum('1')">1</div>
        <div class="btn" onclick="appendNum('2')">2</div>
        <div class="btn" onclick="appendNum('3')">3</div>
        <div class="btn" onclick="appendNum('4')">4</div>
        <div class="btn" onclick="appendNum('5')">5</div>
        <div class="btn" onclick="appendNum('6')">6</div>
        <div class="btn" onclick="appendNum('7')">7</div>
        <div class="btn" onclick="appendNum('8')">8</div>
        <div class="btn" onclick="appendNum('9')">9</div>
        <div class="btn" onclick="appendNum('*')">*</div>
        <div class="btn" onclick="appendNum('0')">0</div>
        <div class="btn" onclick="appendNum('#')">#</div>
        
        <!-- खाली जगह एडजस्ट करने के लिए -->
        <div></div> 
        <!-- असली सिम से कॉल लगाने वाला बटन -->
        <div class="btn call-btn" onclick="startCall()">📞</div>
        <!-- एक-एक नंबर मिटाने वाला बटन -->
        <div class="btn delete-btn" onclick="backspace()">⌫</div>
    </div>
</div>

<script>
    const screen = document.getElementById('phone-screen');

    function appendNum(num) {
        screen.value += num;
    }

    function backspace() {
        screen.value = screen.value.slice(0, -1);
    }

    function startCall() {
        const number = screen.value;
        if(number) {
            // यह लाइन आपके मोबाइल के असली डायलर को ट्रिगर करके सीधे कॉल मिला देगी
            window.location.href = "tel:" + encodeURIComponent(number);
        } else {
            alert("कृपया कॉल करने के लिए कोई नंबर टाइप करें!");
        }
    }
</script>

</body>
</html>
