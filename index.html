<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patalix AI - Hidden Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Patalix AI</h1>
            <p>Created by a 12-year-old Genius 🧠</p>
        </header>
        
        <div id="token-status">Tokens Left: <span id="tokens">3</span>/3</div>

        <div class="voice-center">
            <div id="voice-trigger" class="pulse-ring">
                <img src="https://img.icons8.com/ios-filled/100/2196F3/microphone.png" alt="Mic">
            </div>
        </div>

        <div class="grid-features">
            <button class="card">🎨 Image Studio</button>
            <button class="card">🎵 Music Creator</button>
            <button class="card">📂 All Projects</button>
            <button class="card">🔐 Private Chat</button>
        </div>

        <div id="chat-container">
            <div id="chat-output"></div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Ask Patalix...">
                <button id="send-btn">Send</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
