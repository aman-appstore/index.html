<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patalix DialPad</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; }
        body { background: #121212; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; }
        .dialer-container { width: 100%; max-width: 360px; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* एड्स के लिए टॉप बैनर की जगह */
        .ad-banner { width: 100%; height: 50px; background: #222; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; font-size: 12px; color: #666; border: 1px dashed #444; }
        
        .display { width: 100%; height: 60px; font-size: 32px; text-align: center; border: none; background: transparent; color: white; margin-bottom: 30px; outline: none; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%; justify-items: center; }
        .btn { width: 75px; height: 75px; border-radius: 50%; background: #2a2a2a; color: white; font-size: 28px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; user-select: none; }
        .btn:active { background: #444; }
        .call-btn { background: #4CD964; grid-column: 2; }
        .call-btn:active { background: #3cc253; }
        .delete-btn { font-size: 20px; background: transparent; color: #ff3b30; }
    </style>
</head>
<body>

<div class="dialer-container">
    <!-- यहाँ आपका AdMob का बैनर एड लगेगा -->
    <div class="ad-banner">जल्द ही यहाँ विज्ञापन (Ads) दिखेंगे</div>

    <input type="text" class="display" id="output" placeholder="नंबर टाइप करें" readonly>
    
    <div class="grid">
        <div class="btn" onclick="press('1')">1</div>
        <div class="btn" onclick="press('2')">2</div>
        <div class="btn" onclick="press('3')">3</div>
        <div class="btn" onclick="press('4')">4</div>
        <div class="btn" onclick="press('5')">5</div>
